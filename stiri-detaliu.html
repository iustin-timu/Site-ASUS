<!DOCTYPE html>
<html lang="ro" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articol - ASUS Suceava</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* VARIABILE */
    :root {
      --color-primary: #003087; --color-primary-light: #e8edf7; --color-gold: #F4A261;
      --color-bg: #F0F4F8; --color-surface: #FFFFFF; --color-border: rgba(0,48,135,0.12);
      --color-text: #0A1628; --color-text-muted: #4A5568;
      --shadow-md: 0 12px 32px rgba(0,48,135,0.08); --shadow-lg: 0 24px 60px rgba(0,48,135,0.15);
      --radius-lg: 20px; --radius-xl: 30px; --radius-full: 9999px;
      --font-display: 'Plus Jakarta Sans', sans-serif; --font-body: 'Inter', sans-serif;
      --navbar-bg: transparent; --navbar-scrolled-bg: rgba(255,255,255,0.95);
      --nav-link-color: rgba(255,255,255,0.9); --nav-link-scrolled: #4A5568;
    }

    [data-theme="dark"] {
      --color-primary: #4D7FCC; --color-bg: #0A1628; --color-surface: #111d35; 
      --color-border: rgba(255,255,255,0.10); --color-text: #E2E8F4; --color-text-muted: #8899BB;
      --navbar-scrolled-bg: rgba(10,22,40,0.95); --nav-link-scrolled: #8899BB;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);line-height:1.7;}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;height:auto;display:block}
    h1, h2, h3 { font-family:var(--font-display); }
    .container{max-width:1200px;margin:0 auto;padding:0 24px}

    /* REVEAL ANIMATIONS (APPLE STYLE) */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-scale { opacity: 0; transform: scale(0.95) translateY(20px); transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-scale.visible { opacity: 1; transform: scale(1) translateY(0); }
    .del-1 { transition-delay: 0.1s; } .del-2 { transition-delay: 0.2s; }

    /* NAVBAR - Solid by default for reading pages */
    #navbar{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .5s; padding: 5px 0; background:var(--navbar-scrolled-bg); backdrop-filter:blur(20px); box-shadow:var(--shadow-md);}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:70px;}
    .nav-links{display:flex;gap:6px;}
    .nav-links a{font-weight:600;font-size:.9rem;padding:10px 18px;border-radius:var(--radius-full);color:var(--nav-link-scrolled);transition:all .3s}
    .nav-links a:hover{color:var(--color-primary);background:var(--color-primary-light)}
    .logo-alb { display: none; width: 180px; } .logo-negru { display: block; width: 180px;}
    [data-theme="dark"] .logo-alb { display: block; } [data-theme="dark"] .logo-negru { display: none; }

    /* ════════════════════════════════════════════════════════════════
       STRUCTURĂ ARTICOL
    ════════════════════════════════════════════════════════════════ */
    .article-header { padding: 160px 0 60px; text-align: center; max-width: 800px; margin: 0 auto; }
    .article-category { display: inline-block; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--color-primary); background: var(--color-primary-light); padding: 8px 16px; border-radius: var(--radius-full); letter-spacing: 0.1em; margin-bottom: 20px; }
    .article-title { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 800; line-height: 1.15; color: var(--color-text); margin-bottom: 20px; letter-spacing: -0.02em; }
    .article-meta { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 0.95rem; color: var(--color-text-muted); font-weight: 500; }
    
    .article-cover { max-width: 1000px; margin: 0 auto 60px; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); }
    .article-cover img { width: 100%; max-height: 600px; object-fit: cover; }

    /* Partea de Citit (Așezare tip ziar, mai îngustă pentru vizibilitate) */
    .article-content { max-width: 760px; margin: 0 auto 80px; font-size: 1.15rem; line-height: 1.8; color: var(--color-text); }
    .article-content p { margin-bottom: 24px; }
    .article-content h3 { font-size: 1.6rem; margin: 40px 0 20px; color: var(--color-text); }

    /* Galerie Foto (Dacă sunt mai multe poze la știre) */
    .article-gallery { max-width: 1000px; margin: 0 auto 80px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .gallery-img { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); aspect-ratio: 4/3; }
    .gallery-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .gallery-img:hover img { transform: scale(1.05); cursor: pointer; }

    /* Buton Înapoi */
    .back-btn-container { text-align: center; padding-bottom: 80px; }
    .btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-full); font-weight: 700; color: var(--color-text); transition: all 0.3s; box-shadow: var(--shadow-sm); }
    .btn-back:hover { border-color: var(--color-primary); color: var(--color-primary); transform: translateY(-4px); box-shadow: var(--shadow-md); }

    .loader { text-align: center; padding: 150px 20px; font-weight: 700; color: var(--color-primary); font-size: 1.2rem; }
    
    /* Footer Simplu */
    #footer{background:#0A1628;padding:40px 0; text-align:center; color:rgba(255,255,255,0.4); margin-top: 0;}
  </style>
</head>

<body>
  <header id="navbar" class="scrolled">
    <div class="container nav-inner">
      <a href="asus-suceava.html" class="nav-logo">
        <img src="logo-alb.png" alt="Logo ASUS" class="logo-alb">
        <img src="logo-negru.png" alt="Logo ASUS" class="logo-negru">
      </a>
      <nav class="nav-links">
        <a href="asus-suceava.html#despre">Despre noi</a>
        <a href="reprezentanti.html">Studenți Reprezentanți</a>
        <a href="asus-suceava.html#proiecte">Proiecte</a>
        <a href="stiri.html" style="color:var(--color-primary);">Știri</a>
        <a href="asus-suceava.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <div id="articleContainer">
      <div class="loader"><i data-lucide="loader-2" class="lucide-spin" style="margin-bottom:10px;"></i><br>Se încarcă articolul...</div>
    </div>
  </main>

  <footer id="footer">
    © 2026 ASUS Suceava. Toate drepturile rezervate.
  </footer>

  <script>
    // Inițializare Supabase
    const SUPABASE_URL = 'https://hxlwskalrmcepaqdyrgp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4bHdza2Fscm1jZXBhcWR5cmdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzE0NDYsImV4cCI6MjA5MjYwNzQ0Nn0.9V9PDaNtSvZqrP4Kg6YahvIKMiJfPpVZpLW26d0NbZw';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Activăm Iconițele
    if (window.lucide) { lucide.createIcons(); }

    function formatDate(dateString) {
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        return new Date(dateString).toLocaleDateString('ro-RO', options);
    }

    async function loadArticle() {
        const container = document.getElementById('articleContainer');
        
        // 1. Luăm ID-ul știrii din URL (ex: stire-detaliu.html?id=5)
        const urlParams = new URLSearchParams(window.location.search);
        const stireId = urlParams.get('id');

        if (!stireId) {
            container.innerHTML = `<div class="loader" style="color:red;">Eroare: Nu a fost selectată nicio știre.<br><a href="stiri.html" style="text-decoration:underline; font-size:1rem; margin-top:20px; display:inline-block; color:var(--color-primary);">Întoarce-te la știri</a></div>`;
            return;
        }

        try {
            // 2. Căutăm știrea în Supabase
            const { data: stire, error } = await _supabase
                .from('stiri')
                .select('*')
                .eq('id', stireId)
                .single();

            if (error || !stire) throw error;

            // 3. Procesăm pozele (prima e coperta, restul sunt galeria)
            let imagini = [];
            if (stire.imagine_url) {
                imagini = stire.imagine_url.split(',').map(img => img.trim());
            }
            const coverImg = imagini.length > 0 ? imagini[0] : 'https://picsum.photos/seed/asus/1000/600';
            const galleryImgs = imagini.slice(1); // Toate pozele fără prima

            // 4. Procesăm textul ca să aibă paragrafe (înlocuim Enter-urile cu <p>)
            const textFormatat = stire.continut.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('');

            // 5. Construim HTML-ul dinamic
            let html = `
                <div class="container">
                    <header class="article-header reveal">
                        <div class="article-category">${stire.categorie || 'Comunitate'}</div>
                        <h1 class="article-title">${stire.titlu}</h1>
                        <div class="article-meta">
                            <i data-lucide="calendar"></i> Publicat pe ${formatDate(stire.created_at)}
                        </div>
                    </header>
                </div>

                <div class="container">
                    <div class="article-cover reveal-scale del-1">
                        <img src="${coverImg}" alt="${stire.titlu}">
                    </div>
                </div>

                <div class="container">
                    <div class="article-content reveal del-2">
                        ${textFormatat}
                    </div>
                </div>
            `;

            // Dacă avem mai multe poze, adăugăm secțiunea de Galerie
            if (galleryImgs.length > 0) {
                html += `
                    <div class="container">
                        <h3 class="reveal" style="text-align:center; margin-bottom:30px;">Galerie Foto</h3>
                        <div class="article-gallery reveal">
                            ${galleryImgs.map(img => `
                                <div class="gallery-img">
                                    <img src="${img}" alt="Imagine galerie" loading="lazy">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Butonul de înapoi
            html += `
                <div class="back-btn-container reveal">
                    <a href="stiri.html" class="btn-back"><i data-lucide="arrow-left" width="18" height="18"></i> Toate știrile</a>
                </div>
            `;

            container.innerHTML = html;
            
            // Re-inițializăm iconițele noi și animațiile
            if (window.lucide) lucide.createIcons();
            const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
            document.querySelectorAll('.reveal, .reveal-scale').forEach(el => observer.observe(el));

        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="loader" style="color:red;">Știrea nu a fost găsită sau a fost ștearsă.<br><a href="stiri.html" style="text-decoration:underline; font-size:1rem; margin-top:20px; display:inline-block; color:var(--color-primary);">Întoarce-te la știri</a></div>`;
        }
    }

    loadArticle();
  </script>
</body>
</html>
